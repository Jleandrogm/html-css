<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1> 
    <p>Esse video está hospedado no meu próprio servidor</p> 
    <video controls poster="imagens/imagem-cafe.jpg" width="560" autoplay loop> 
        <source src="midias/Meu-video 720px.mp4" type="video/mp4"> 
        <source src="midias/Meu-video.ogv" type="video/ogg">  
        <p>Infelizmente seu navegador não conseguiu carregar o vídeo</p>
    </video> 
    <h1>inserindo vídeos do Youtube</h1> 
    <iframe width="560" height="315" src="https://www.youtube.com/embed/P7Cz2IPe5J8" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe> 
    <h1>Inserindo videos do Vimeo</h1> 
    <iframe src="https://player.vimeo.com/video/148268430?h=518e1141a4&loop=1" width="560" height="315" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
</body>
</html>
