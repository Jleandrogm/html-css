<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagens dinamicas</h1> 
    <p>Tente abrir este site em varios dispositivos diferentes ou simplesmente aumente e diminua o tamanho do navegador</p> 
        <picture> 
            <source media="(max-width: 750px )" srcset="imagens/foto-p.png" type="image/png">
            <source media="(max-width: 1050px )" srcset="imagens/foto-m.png" type="image/png">
            <img src="imagens/foto-g.png" alt="Imagens flexivel">
        </picture> 
<h1>Reproduzindo áudio</h1> 
<p>Vamos aprender a reproduzir audio em HTML5</p> 
<audio preload="metadata" controls autoplay> 
    <source src="midia/guanacast-33.mp3" type="audio/mpeg"> 
    <source src="midia/guanacast-33.mp3" type="audio/ogg"> 
    <source src="midia/guanacast-33.mp3" type="image/wav"> 
    <p>Seu navegador não suporta áudio, você pode fazer o dowload do arquivo <a href="midia/guanacast-33.mp3" type="audio/mpeg">aqui</a></p>
</audio>
</body>
</html>
